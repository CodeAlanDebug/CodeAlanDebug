name: GitHub-Profile-Summary-Cards

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

concurrency:
  group: profile-summary-cards
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-github-cards

    steps:
      - uses: actions/checkout@v4
      - uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          GITHUB_TOKEN: ${{ secrets.SUMMARY_CARD_TOKEN || github.token }}
        with:
          USERNAME: ${{ github.repository_owner }}
          # Push generated cards to the repository default branch (master/main).
          BRANCH_NAME: ${{ github.event.repository.default_branch }}
          # UTC_OFFSET is optional, default to zero
          UTC_OFFSET: 1
          # EXCLUDE is an optional comma separated list of languages to exclude.
          EXCLUDE: ""
          # AUTO_PUSH controls whether generated files are committed automatically.
          AUTO_PUSH: true
